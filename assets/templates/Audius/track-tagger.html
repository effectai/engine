<style>
  #app {
    max-width: 800px;
    margin: 0 auto;
    padding: 1rem;
    text-align: center;
  }
  .tag-section {
    margin-bottom: 2rem;
  }
  .tag-section h2 {
    margin-bottom: 1rem;
  }
  .radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
  }
  .radio-option input[type="radio"] {
    position: absolute;
    opacity: 0;
  }
  .radio-option label {
    display: inline-block;
    padding: 0.5rem 1rem;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 4px;
    cursor: pointer;
  }
  .radio-option input[type="radio"]:checked + label {
    background: #4a90e2;
    color: white;
    border-color: #4a90e2;
  }
  .other-input {
    margin-top: 0.5rem;
  }
  audio {
    width: 100%;
    max-width: 600px;
    margin: 1rem 0;
  }
</style>

  <div id="app">
    <h1>Effect AI - Track Tagger</h1>

    <audio ref="songPlayer" controls>
      <source :src="songSource" type="audio/mp3" />
    </audio>

    <p v-if="notComplete" style="color: red;">
      Task incomplete - Please complete all sections of the task
    </p>

    <div class="tag-section">
      <h2>🎵 Genre</h2>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" id="genre-electronic" name="genre" value="Electronic" v-model="selectedGenre" />
          <label for="genre-electronic">Electronic</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="genre-rock" name="genre" value="Rock" v-model="selectedGenre" />
          <label for="genre-rock">Rock</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="genre-metal" name="genre" value="Metal" v-model="selectedGenre" />
          <label for="genre-metal">Metal</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="genre-alternative" name="genre" value="Alternative" v-model="selectedGenre" />
          <label for="genre-alternative">Alternative</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="genre-hiphop" name="genre" value="Hip-Hop/Rap" v-model="selectedGenre" />
          <label for="genre-hiphop">Hip-Hop/Rap</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="genre-punk" name="genre" value="Punk" v-model="selectedGenre" />
          <label for="genre-punk">Punk</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="genre-folk" name="genre" value="Folk" v-model="selectedGenre" />
          <label for="genre-folk">Folk</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="genre-classical" name="genre" value="Classical" v-model="selectedGenre" />
          <label for="genre-classical">Classical</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="genre-other" name="genre" value="Other" v-model="selectedGenre" />
          <label for="genre-other">Other</label>
        </div>
      </div>
      <div v-if="selectedGenre === 'Other'" class="other-input">
        <input type="text" class="input" placeholder="Enter genre" v-model="selectedGenreOther" />
      </div>
    </div>

    <div class="tag-section">
      <h2>🎙️ Vocal Presence</h2>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" id="vocals-instrumental" name="vocals" value="Instrumental" v-model="selectedVocals"/>
          <label for="vocals-instrumental">Instrumental</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="vocals-single" name="vocals" value="Vocal (Single)" v-model="selectedVocals"/>
          <label for="vocals-single">Vocal (Single)</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="vocals-multiple" name="vocals" value="Vocal (Multiple)" v-model="selectedVocals"/>
          <label for="vocals-multiple">Vocal (Multiple)</label>
        </div>
      </div>
    </div>

    <div class="tag-section">
      <h2>🎤 Lyric Clarity</h2>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" id="clarity-very-clear" name="clarity" value="Very Clear" v-model="selectedClarity"/>
          <label for="clarity-very-clear">Very Clear</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="clarity-clear" name="clarity" value="Clear" v-model="selectedClarity"/>
          <label for="clarity-clear">Clear</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="clarity-somewhat" name="clarity" value="Somewhat Clear" v-model="selectedClarity"/>
          <label for="clarity-somewhat">Somewhat Clear</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="clarity-unclear" name="clarity" value="Unclear" v-model="selectedClarity"/>
          <label for="clarity-unclear">Unclear</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="clarity-instrumental" name="clarity" value="Instrumental" v-model="selectedClarity"/>
          <label for="clarity-instrumental">Instrumental</label>
        </div>
      </div>
    </div>

    <div class="tag-section">
      <h2>💭 How it makes you feel</h2>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" id="mood-happy" name="mood" value="Happy" v-model="selectedMood"/>
          <label for="mood-happy">Happy</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="mood-sad" name="mood" value="Sad" v-model="selectedMood"/>
          <label for="mood-sad">Sad</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="mood-aggressive" name="mood" value="Aggressive" v-model="selectedMood"/>
          <label for="mood-aggressive">Aggressive</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="mood-chill" name="mood" value="Chill" v-model="selectedMood"/>
          <label for="mood-chill">Chill</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="mood-uplifting" name="mood" value="Uplifting" v-model="selectedMood"/>
          <label for="mood-uplifting">Uplifting</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="mood-dark" name="mood" value="Dark" v-model="selectedMood"/>
          <label for="mood-dark">Dark</label>
        </div>
      </div>
    </div>

    <div class="tag-section">
      <h2>💃 Danceability</h2>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" id="dance-not" name="dance" value="Not Danceable" v-model="selectedDance"/>
          <label for="dance-not">Not Danceable</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="dance-somewhat" name="dance" value="Somewhat Danceable" v-model="selectedDance"/>
          <label for="dance-somewhat">Somewhat Danceable</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="dance-very" name="dance" value="Very Danceable" v-model="selectedDance"/>
          <label for="dance-very">Very Danceable</label>
        </div>
      </div>
    </div>

    <button
      @click.prevent="uploadAndSubmit"
      class="button is-success is-large"
      :class="{'is-loading': btnLoading}"
      :disabled="btnLoading"
    >
      Submit
    </button>
  </div>


  <!-- 📚 Load in resources: [Bulma, Effect Network Styling]  -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/bulma@0.9.4/css/bulma.min.css"
  />
  <link href="https://app.effect.network/force-defaults.css" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/ipfs-http-client/dist/index.min.js"></script>
  <script type="module">
    import { createApp } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

    createApp({
      data() {
        return {
          title: "Effect AI - Track Tagger",
          songSource: "${song_url}",
          btnLoading: false,
          notComplete: false,
          selectedGenre: "",
          selectedMood: "",
          selectedClarity: "",
          selectedDance: "",
          selectedVocals: "",
          selectedGenreOther: "",
          instructions: `
          <div class="">
            <h2 class="text-lg">Song Tagging Instructions</h2>
            <p>
              Listen to the track and tag it with appropriate attributes. Your input helps improve music discovery and organization.
            </p>
            <br><hr><br>
            <h3>Guidelines:</h3>
            <li><strong>Genre:</strong> Select the primary genre of the track. If it doesn't fit standard genres, choose "Other" and specify.</li>
            <li><strong>How it makes you feel:</strong> Choose the emotion or mood that best describes how the track makes you feel.</li>
            <li><strong>Lyric Clarity:</strong> Rate how clear and understandable the lyrics are. Choose "Instrumental" if there are no vocals.</li>
            <li><strong>Danceability:</strong> Assess how suitable the track is for dancing based on rhythm and tempo.</li>
            <li><strong>Vocal Presence:</strong> Indicate if the track is instrumental or has single/multiple vocalists.</li>
            <br><hr><br>
            <h3>Important Notes:</h3>
            <li>Songs may take a few seconds to load. If the song does not load in a reasonable amount of time, please report the task.</li>
            <li>Listen to at least 30 seconds of the song before answering the questions.</li>
            <li>Try to be accurate — guess only if you genuinely can't tell.</li>
            <li>Use headphones or a quiet environment for the best experience.</li>
            <li>If the song abruptly cuts off, is silent, or sounds corrupted, please report it.</li>
            <li>All fields are required before you can submit.</li>
          </div>`
        };
      },
      computed: {},
      created() {},
      mounted() {
        this.$refs.songPlayer.volume = 0.25;
        window.top.postMessage(
        {
          type: 'task-instructions',
          instructions: this.instructions
        },
        "*"
      );
      },
      methods: {
        async uploadAndSubmit() {
          this.btnLoading = true;
          const fields = [this.selectedGenre, this.selectedMood, this.selectedClarity, this.selectedDance, this.selectedVocals];
          if (fields.some(field => field === "")) {
            this.notComplete = true
          }
          else
            try {
              parent.postMessage(
                {
                  task: "submit",
                  values: {
                    taskTitle: this.title,
                    answer:{
                      song: this.songSource,
                      genre: this.selectedGenre,
                      mood: this.selectedMood,
                      clarity: this.selectedClarity,
                      dance: this.selectedDance,
                      vocals: this.selectedVocals,
                    }

                  },
                },
                "*",
              );
            } catch (error) {
              console.error("Failed to upload to IPFS", error);
            }
          this.btnLoading = false;
        },
      },
    }).mount("#app");
  </script>
</div>
