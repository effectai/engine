syntax = "proto3";

import "./payment/message.proto";
import "./task/message.proto";

message EffectError {
  uint32 timestamp = 1;
  string message = 2;
  string code = 3;
}

message EffectAcknowledgment {
  uint32 timestamp = 1;
}

message EffectIdentifyRequest {
  uint32 timestamp = 1;
}

message EffectIdentifyResponse {
  optional string name = 1;
  string version = 2;
  bytes peer = 3;
  string pubkey = 4;
  uint32 batch_size = 5;
  uint32 task_timeout = 6;
  bool requires_registration = 7;
  bool is_registered = 8;
  bool is_connected = 9;
}

message RequestToWork {
  uint32 timestamp = 1;
  string recipient = 2;
  uint64 nonce = 3;
  string capabilities = 4;
  optional string access_code = 5;
}

message RequestToWorkResponse {
  uint32 timestamp = 1;
  string pubkey = 2;
  string peer = 3;
}

message WorkerSyncRequest {
  uint32 timestamp = 1;
  string worker_id = 2;
  optional uint64 cursor = 3;
  repeated string scopes = 4;
  optional uint32 limit = 5;
  optional string tasks_cursor = 6;
  optional string payments_cursor = 7;
}

message WorkerSyncStatus {
  string state = 1;
  uint32 last_activity = 2;
}

message WorkerSyncTask {
  string task_id = 1;
  string status = 2;
  uint32 last_event_at = 3;
  Task task = 4;
}

message WorkerSyncPayment {
  string payment_id = 1;
  string status = 2;
  string amount = 3;
  optional string task_id = 4;
  uint32 created_at = 5;
  Payment payment = 6;
}

message WorkerSyncResponse {
  uint32 server_time = 1;
  string worker_id = 2;
  uint64 cursor = 3;
  string manager_peer_id = 4;
  optional WorkerSyncStatus status = 5;
  repeated string capabilities = 6;
  repeated WorkerSyncTask tasks = 7;
  repeated WorkerSyncPayment payments = 8;
  optional string tasks_cursor = 9;
  optional string payments_cursor = 10;
  bool tasks_has_more = 11;
  bool payments_has_more = 12;
}

message EffectProtocolMessage {
  oneof message {
    Task task = 1;
    TaskAccepted task_accepted = 2;
    TaskRejected task_rejected = 3;
    TaskCompleted task_completed = 4;
    Payment payment = 5;
    PayoutRequest payout_request = 6;
    ProofRequest proof_request = 7;
    ProofResponse proof_response = 8;
    TemplateRequest template_request = 9;
    Template template_response = 10;
    EffectError error = 11;
    EffectAcknowledgment ack = 12;
    RequestToWork request_to_work = 13;
    RequestToWorkResponse request_to_work_response = 14;
    EffectIdentifyRequest identify_request = 15;
    EffectIdentifyResponse identify_response = 16;
    BulkProofRequest bulk_proof_request = 17;
    WorkerSyncRequest worker_sync_request = 18;
    WorkerSyncResponse worker_sync_response = 19;
  }
}
